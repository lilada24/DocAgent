server:
  port: 8080

spring:
  application:
    name: docagent-backend

  profiles:
    active: prod

  datasource:
    url: jdbc:mysql://localhost:3306/docagentdb?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: docagent
    password: ${DB_PASSWORD:your_strong_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  jackson:
    date-format: yyyy-MM-dd'T'HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

agent:
  api:
    base-url: http://localhost:8000
    timeout: 300000

jwt:
  secret: ${JWT_SECRET:DocAgentSecretKeyForJWTTokenGeneration2024MustBeAtLeast256BitsLong!}
  expiration: 86400000

cors:
  allowed-origins: ${CORS_ORIGIN:https://your-domain.com}

logging:
  level:
    root: INFO
    com.example.docagent: DEBUG
  file:
    name: /var/log/docagent/backend.log